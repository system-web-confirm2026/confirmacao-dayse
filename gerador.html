<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Dra. Dayse | Gerador</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e2e5e9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; border: 2px solid #b2bec3; }
        h3 { color: #2d3436; margin-bottom: 20px; }
        label { display: block; text-align: left; font-size: 14px; color: #636e72; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #2d6a4f; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #1b4332; }
        #res { margin-top: 20px; font-size: 11px; word-break: break-all; color: #2d6a4f; display: none; padding: 10px; background: #f9f9f9; border: 1px dashed #2d6a4f; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Gerador de Link RSVP</h3>
        
        <label>Nome do Paciente:</label>
        <input type="text" id="p" placeholder="Ex: João Silva">
        
        <label>Hora da Sessão:</label>
        <input type="time" id="h">
        
        <button onclick="copy()">Gerar e Copiar Link</button>
        
        <div id="res"></div>
    </div>

    <script>
        function copy() {
            const p = document.getElementById('p').value;
            const h = document.getElementById('h').value;
            if(!p || !h) return alert("Por favor, preencha o nome e o horário!");
            
            // Link do seu repositório no GitHub Pages
            const baseURL = "https://system-web-confirm2026.github.io/confirmacao-dayse/";
            const link = `${baseURL}?p=${encodeURIComponent(p)}&h=${h}`;
            
            navigator.clipboard.writeText(link).then(() => {
                const res = document.getElementById('res');
                res.innerText = link;
                res.style.display = "block";
                alert("Sucesso! Link personalizado copiado para sua área de transferência.");
            }).catch(err => {
                alert("Erro ao copiar. Tente selecionar o link abaixo e copiar manualmente.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
